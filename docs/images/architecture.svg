<svg xmlns="http://www.w3.org/2000/svg" width="960" height="620" viewBox="0 0 960 620" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="layer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f2d3d"/>
      <stop offset="1" stop-color="#162433"/>
    </linearGradient>
  </defs>

  <rect width="960" height="620" fill="#0d1622"/>
  <text x="32" y="46" fill="#e8eef5" font-size="23" font-weight="700">SecuritasWall — runtime architecture</text>
  <text x="32" y="70" fill="#8aa0b6" font-size="13">Hardened, headless xfce developer desktop. All egress is forced through an on-box filtering proxy.</text>

  <!-- client -->
  <rect x="32" y="96" width="220" height="86" rx="10" fill="#13302b" stroke="#2f7d5b"/>
  <text x="142" y="126" fill="#5fd0a0" font-size="14" font-weight="700" text-anchor="middle">Your browser / VNC client</text>
  <text x="142" y="150" fill="#c4d2e0" font-size="12" text-anchor="middle">noVNC (HTML5) or VNC viewer</text>
  <text x="142" y="170" fill="#8aa0b6" font-size="11" text-anchor="middle">password shown in run log</text>

  <!-- ports -->
  <line x1="252" y1="139" x2="300" y2="139" stroke="#4fb0c6" stroke-width="2.5"/>
  <text x="262" y="132" fill="#4fb0c6" font-size="11">:6901 http</text>
  <text x="262" y="158" fill="#4fb0c6" font-size="11">:5901 vnc</text>

  <!-- container outer -->
  <rect x="300" y="92" width="628" height="500" rx="14" fill="none" stroke="#2f4763" stroke-width="2"/>
  <text x="320" y="116" fill="#9fb4ca" font-size="13" font-weight="700">Docker container · non-root user superstar (uid 1500)</text>

  <!-- desktop layer -->
  <rect x="324" y="132" width="420" height="70" rx="9" fill="url(#layer)" stroke="#2f4763"/>
  <text x="342" y="158" fill="#e8eef5" font-size="14" font-weight="700">xfce4 desktop  ·  TigerVNC  ·  noVNC 1.5</text>
  <text x="342" y="182" fill="#c4d2e0" font-size="12">supervisor-managed session, custom fonts, splash</text>

  <!-- dev tools layer -->
  <rect x="324" y="214" width="420" height="118" rx="9" fill="url(#layer)" stroke="#2f4763"/>
  <text x="342" y="240" fill="#e8eef5" font-size="14" font-weight="700">Developer toolchain</text>
  <g fill="#c4d2e0" font-size="12">
    <text x="342" y="266">• OpenJDK 21 (LTS)</text>
    <text x="342" y="288">• Apache Tomcat 10.1</text>
    <text x="342" y="310">• Eclipse 2024-09</text>
    <text x="552" y="266">• MySQL 8.4 (LTS)</text>
    <text x="552" y="288">• Gradle 8.10</text>
    <text x="552" y="310">• Firefox · Chromium</text>
  </g>

  <!-- base layer -->
  <rect x="324" y="344" width="420" height="62" rx="9" fill="url(#layer)" stroke="#2f4763"/>
  <text x="342" y="370" fill="#4fb0c6" font-size="14" font-weight="700">Ubuntu 24.04 LTS base</text>
  <text x="342" y="392" fill="#c4d2e0" font-size="12">unattended-upgrades · en_US.UTF-8 locale · nss-wrapper</text>

  <!-- persistence -->
  <rect x="324" y="418" width="420" height="58" rx="9" fill="#1a2740" stroke="#3a567c"/>
  <text x="342" y="442" fill="#e8eef5" font-size="13" font-weight="700">Persisted home volume</text>
  <text x="342" y="462" fill="#c4d2e0" font-size="12">-v ~/DockerVolume:/home/hostVolume</text>

  <!-- security sidecar column -->
  <rect x="764" y="132" width="144" height="344" rx="9" fill="#2a1c2e" stroke="#7d3f63"/>
  <text x="836" y="156" fill="#e7a6cf" font-size="13" font-weight="700" text-anchor="middle">Security</text>
  <g fill="#e8d4e4" font-size="11.5">
    <text x="780" y="186">ClamAV scanner</text>
    <text x="780" y="206" fill="#b9a3c4">~/Downloads,</text>
    <text x="780" y="222" fill="#b9a3c4">.m2, .gradle</text>
    <text x="780" y="250">Squid proxy</text>
    <text x="780" y="270" fill="#b9a3c4">forced egress +</text>
    <text x="780" y="286" fill="#b9a3c4">domain allowlist</text>
    <text x="780" y="314">c-icap (ICAP)</text>
    <text x="780" y="334" fill="#b9a3c4">stream AV scan</text>
    <text x="780" y="362">Daily freshclam</text>
    <text x="780" y="390">No-new-privileges</text>
    <text x="780" y="410" fill="#b9a3c4">restricted sudo</text>
    <text x="780" y="438">Optional view-only</text>
    <text x="780" y="458" fill="#b9a3c4">VNC mode</text>
  </g>

  <!-- egress arrow -->
  <line x1="744" y1="448" x2="600" y2="448" stroke="#7d3f63" stroke-width="1.5" stroke-dasharray="4 3"/>

  <text x="32" y="612" fill="#8aa0b6" font-size="12">Outbound traffic from browsers and build tools is routed through the on-box Squid/c-icap proxy, where it is filtered and virus-scanned.</text>
</svg>
